name: CI

on:
  push:
  pull_request:

jobs:
  # Fast, self-contained suite: mocked Plaid/Gmail test doubles + real Postgres.
  # No live server process is started — supertest talks to the Express app
  # in-process. This is the primary `npm test` and should stay quick.
  unit-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: subaudit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/subaudit_test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run unit/integration tests (mocked Plaid & Gmail)
        working-directory: server
        run: npm test

  # Slower, full-stack smoke test: boots the real server and drives it with
  # the pre-existing live HTTP suite (server/test-api.mjs). Runs in its own
  # job/Postgres so a slow or flaky boot here never blocks the fast suite
  # above from reporting results.
  legacy-e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: subaudit_legacy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/subaudit_legacy
      JWT_SECRET: ci-test-secret
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Start server
        working-directory: server
        run: |
          node index.js > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3001/api/auth/register || true)
            if [ "$code" != "000" ]; then exit 0; fi
            sleep 0.5
          done
          echo "Server did not become ready in time" && cat /tmp/server.log && exit 1

      - name: Run legacy end-to-end suite
        working-directory: server
        run: npm run test:legacy

      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/server.pid)" 2>/dev/null || true

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-server-log
          path: /tmp/server.log
